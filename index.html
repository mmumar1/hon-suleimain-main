<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Hon. Suleiman Salihu Usman | Official Website</title>
    <meta name="description" content="Official digital presence of Honourable Suleiman Salihu Usman, NDC aspirant for House of Representatives, Zamfara State, Nigeria. Leadership, Service, Community Impact." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://suleimanusmanfor.ng" />
    <!-- Open Graph -->
    <meta property="og:title" content="Hon. Suleiman Salihu Usman | Official Website" />
    <meta property="og:description" content="Official digital presence of Honourable Suleiman Salihu Usman, NDC aspirant for House of Representatives, Zamfara State, Nigeria." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://suleimanusmanfor.ng" />
    <meta property="og:image" content="/og-image.jpg" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hon. Suleiman Salihu Usman | Official Website" />
    <meta name="twitter:description" content="Official digital presence of Honourable Suleiman Salihu Usman, NDC aspirant for House of Representatives, Zamfara State, Nigeria." />
    <meta name="twitter:image" content="/og-image.jpg" />
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Honourable Suleiman Salihu Usman",
      "jobTitle": "House of Representatives Aspirant",
      "affiliation": {
        "@type": "Organization",
        "name": "Nigeria Democratic Congress (NDC)"
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Zamfara State",
        "addressCountry": "NG"
      },
      "url": "https://suleimanusmanfor.ng",
      "sameAs": [
        "https://twitter.com/suleimanusmanfor",
        "https://facebook.com/suleimanusmanfor"
      ]
    }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!--
      Netlify Forms: static hidden forms for build-time detection.
      These are never shown — they tell Netlify what form fields to capture
      before the React app hydrates.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>

    <form name="volunteer" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="ward" />
      <input type="text" name="lga" />
      <input type="text" name="occupation" />
      <input type="text" name="skills" />
      <input type="text" name="availability" />
      <input type="text" name="areas-of-interest" />
    </form>

    <form name="program-application" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="hidden" name="program-name" />
      <input type="text" name="full-name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="gender" />
      <input type="date" name="date-of-birth" />
      <input type="text" name="address" />
      <input type="text" name="ward" />
      <input type="text" name="lga" />
      <input type="text" name="state" />
      <input type="text" name="occupation" />
      <input type="text" name="education" />
      <input type="text" name="national-id" />
      <input type="file" name="passport-photo" />
      <input type="file" name="supporting-documents" />
      <textarea name="statement-of-need"></textarea>
      <input type="checkbox" name="declaration" />
    </form>

    <form name="newsletter" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="email" name="email" />
    </form>
  </body>
</html>
